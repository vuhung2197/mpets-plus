<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline';" />
    <title>Mac Pet Plus</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header>
      <span class="title">🐾 Pixel</span>
      <nav class="tabs">
        <button class="tab active" data-tab="timer">Hẹn giờ</button>
        <button class="tab" data-tab="history">Lịch sử</button>
        <button class="tab" data-tab="chat">Chat</button>
        <button class="tab" data-tab="settings">Cài đặt</button>
      </nav>
    </header>

    <!-- Timer -->
    <section class="view active" data-view="timer">
      <div class="phase" id="phase">Tập trung</div>
      <div class="clock" id="clock">25:00</div>
      <div class="sessions" id="sessions">0 phiên hoàn thành</div>
      <div class="controls">
        <button id="startPause" class="primary">Bắt đầu</button>
        <button id="reset">Đặt lại</button>
        <button id="skip">Bỏ qua</button>
      </div>
    </section>

    <!-- History -->
    <section class="view" data-view="history">
      <div class="stat-cards">
        <div class="stat-card">
          <div class="stat-value" id="statFocusToday">0</div>
          <div class="stat-label">phiên hôm nay</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statMinutesToday">0</div>
          <div class="stat-label">phút tập trung</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statStreak">0</div>
          <div class="stat-label">ngày liên tiếp</div>
        </div>
      </div>

      <div class="heatmap-section">
        <div class="heatmap-header">
          <span class="heatmap-title">35 ngày gần nhất</span>
          <div class="heatmap-legend">
            <span class="legend-label">ít</span>
            <div class="legend-cell" data-level="0"></div>
            <div class="legend-cell" data-level="1"></div>
            <div class="legend-cell" data-level="2"></div>
            <div class="legend-cell" data-level="3"></div>
            <span class="legend-label">nhiều</span>
          </div>
        </div>
        <div class="heatmap" id="heatmap"></div>
      </div>

      <div class="session-list-header">
        <span class="field-label" id="sessionListDate">Hôm nay</span>
        <button id="clearHistory" class="danger-btn">Xóa tất cả</button>
      </div>
      <div class="session-list" id="sessionList"></div>
    </section>

    <!-- Chat -->
    <section class="view" data-view="chat">
      <div class="messages" id="messages"></div>
      <form class="composer" id="composer">
        <input id="chatInput" type="text" placeholder="Nhắn gì đó với Pixel… (hoặc ra lệnh hẹn giờ)" autocomplete="off" />
        <button type="submit" class="primary" id="sendBtn">Gửi</button>
      </form>
      <button id="resetChat" style="margin-top:6px;width:100%;font-size:12px;color:var(--muted);background:transparent;border-color:var(--border)">Xóa lịch sử chat</button>
    </section>

    <!-- Settings -->
    <section class="view" data-view="settings">
      <label class="field-label">Thời gian (phút)</label>
      <div class="duration-grid">
        <span class="duration-label">Tập trung</span>
        <input id="durationFocus" type="number" min="1" max="120" value="25" />
        <span class="duration-label">Nghỉ ngắn</span>
        <input id="durationShort" type="number" min="1" max="60" value="5" />
        <span class="duration-label">Nghỉ dài</span>
        <input id="durationLong" type="number" min="1" max="120" value="15" />
      </div>
      <button id="saveDurations" class="primary">Lưu thời gian</button>

      <label class="checkbox">
        <input type="checkbox" id="petBackground" />
        <span>Hiện nền sau pet (pill mờ trong notch)</span>
      </label>
      <div class="color-swatches" id="bgColorSwatches">
        <button class="swatch" data-bg="rgba(0,0,0,0.40)"         title="Đen"     style="--c:#444"></button>
        <button class="swatch" data-bg="rgba(255,255,255,0.25)"   title="Trắng"   style="--c:#ddd"></button>
        <button class="swatch" data-bg="rgba(244,162,97,0.55)"    title="Cam"     style="--c:#f4a261"></button>
        <button class="swatch" data-bg="rgba(80,160,220,0.55)"    title="Xanh"    style="--c:#50a0dc"></button>
        <button class="swatch" data-bg="rgba(180,100,220,0.55)"   title="Tím"     style="--c:#b464dc"></button>
        <button class="swatch" data-bg="rgba(60,180,140,0.55)"    title="Xanh lá" style="--c:#3cb48c"></button>
      </div>

      <label class="field-label" for="skin">Hình dáng thú cưng</label>
      <select id="skin">
        <option value="cat">🐱 Mèo</option>
        <option value="blob">🟠 Blob</option>
        <option value="ghost">👻 Ma</option>
      </select>

      <label class="field-label">Màu sắc thú cưng</label>
      <div class="color-swatches" id="colorSwatches">
        <button class="swatch" data-color="default" title="Mặc định" style="--c:#f4a261"></button>
        <button class="swatch" data-color="pink"    title="Hồng"     style="--c:#ffb6c8"></button>
        <button class="swatch" data-color="purple"  title="Tím"      style="--c:#be96ff"></button>
        <button class="swatch" data-color="mint"    title="Xanh lá"  style="--c:#8cdcc0"></button>
        <button class="swatch" data-color="dark"    title="Tối"      style="--c:#5a6478"></button>
      </div>

      <label class="field-label" for="apiKey">OpenAI API key</label>
      <input id="apiKey" type="password" placeholder="sk-…" autocomplete="off" />
      <button id="saveKey" class="primary">Lưu key</button>
      <p class="hint" id="keyStatus"></p>
      <p class="hint">Key được lưu cục bộ và chỉ dùng để chat với Pixel.</p>
    </section>

    <script src="./renderer.js"></script>
  </body>
</html>
